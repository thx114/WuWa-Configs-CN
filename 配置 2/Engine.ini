[SystemSettings]

r.Streaming.FullyLoadUsedTextures=1
r.Streaming.HLODStrategy=2
r.Streaming.LimitPoolSizeToVRAM=1
r.Streaming.PoolSizeForMeshes=-1
; 消耗更多内存以预加载资源减少卡顿（不建议8G内存以下开启）

r.ScreenPercentage=100 ;渲染精度 100%为当前分辨率

r.Color.Max=1.1 ;颜色最大值
r.Color.Mid=0.55 ;颜色中间值
r.KuroTonemapping=1 ;1 = 去除库洛滤镜（灰蒙蒙的）3 = 开启库洛滤镜
; 原版值: 1, 0.5, 3
; 图片对比: https://imgsli.com/MjczMTcz https://imgsli.com/MjczMTcw

r.Fog=1 ;0 = 禁用雾 1 = 启用雾 (大世界雾，不是体积雾)

r.Shadow.FilterMethod=0 ;阴影过滤方法 ：0:PCF(默认) 1:PCSS(不推荐，边缘有噪点阴影) 2:Kuro Soft Shadow(旧)
r.AmbientOcclusionMaxQuality=100 ;环境光遮蔽
r.Shadow.MaxCSMResolution=2048 ;最大阴影分辨率 ：默认512
r.Shadow.MinResolution=2048 ;最小阴影分辨率
r.Shadow.PerObjectShadowMapResolution=2048 ;每对象阴影分辨率
r.Shadow.PerObjectResolutionMax=2048 ;每对象最大阴影分辨率
r.Shadow.PerObjectResolutionMin=2048 ;每对象最小阴影分辨率
; 阴影对比 https://imgsli.com/MjczMzQ0

r.DetailMode=2 ;对象细节、光照和粒子效果 ：0 = 低, 1 = 中, 2 = 高
r.MaterialQualityLevel=1 ;材质质量 ：0 = 低，1 = 高，2 = 中（是的，数字很奇怪）

r.ViewDistanceScale=2 ;视野距离 ：默认为 1
foliage.LODDistanceScale=2 ;材质加载距离 ：默认为 1
; 距离对比 https://imgsli.com/MzI2NzE2

lod.TemporalLag=0 ;LOD 系统的时间延迟 ：0 为立即更新，增加此值可能会缓解突发加载卡顿

r.SSR.Quality=3 ;反射质量 ：关闭~非常高
r.SSR.Temporal=0 ;反射TAA抗锯齿 ：0 = 关闭，1 = 开启
r.SSR.MaxRoughness=1.0 ;反射最大粗糙度 ：值越高质量越高，但会降低性能
r.SSR.HalfResSceneColor=0 ;半分辨率场景颜色 ：0 = 关闭（高质量），1 = 开启
; 反射对比 https://imgsli.com/MzI2NzIx

r.TemporalAA.Algorithm=0 ;TAA模式 ：0 = 第四代TAA (清晰但可能有闪烁)，1 = 第五代TAA (更平滑但可能更模糊)
r.TemporalAA.Upsampling=1 ;TAA上采样 ：0 = 关闭，1 = 开启
r.TemporalAACurrentFrameWeight=0.35 ;值越高，锯齿越多，移动时模糊越
r.TemporalAAFilterSize=0.09 ;TAA模糊大小 ：值越高，越模糊
r.TemporalAASamples=4 ;TAA采样 ：值越高，消耗越大
r.Kuro.SMAALevelOverride=4 ;SMAA 覆盖 ：0 = 关闭，4 = 4x

FX.BatchAsync=1 ;异步粒子处理
FX.EarlyScheduleAsync=1 ;异步粒子处理

a.URO.ForceAnimRate=1 ;强制动画速率 ：1 = 每帧更新动画（全速更新，最高质量） 2 = 降低动画更新频率,2帧更新一次

r.AllowUseAnyLODAsOcclusionData=1 ;改进剔除以获得更好的性能
r.AlsoUseSphereForFrustumCull=1 ;改进剔除以获得更好的性能

r.EnableMeshPassProcessorsCache=1 ;将缓存用于网格传递处理器（可能会减少卡顿）

wp.Runtime.KuroRuntimeStreamingRangeOverallScale=0.9 ; 远距离对象加载距离缩放 ：默认为 1 , 值越低远距离越模糊，但性能更高
wp.Runtime.OverrideMultipleRuntimeGridLoadingRangeValues=150&300&450&600&1250&5000&500&600&1000&500&650&800&1000&1500&120&150&200&350&80&160&200&200&1500&5000&100&160&200&1000&1500
; 远距离对象渲染, 更改渲染范围


[Core.Log]
global=none ;日志

[KuroCookOpitmize]
KuroCookOpitmize_MultiLoad=True ;多线程加载